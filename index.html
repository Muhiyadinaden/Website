<div class="contact-form">

    <form id="proposalForm">

        <input type="hidden" name="_subject" value="New Proposal Request - REAL Consulting">
        <input type="hidden" name="_template" value="table">
        <input type="hidden" name="_captcha" value="false">

        <div class="form-group">
            <label for="name">Full Name *</label>
            <input type="text" id="name" name="Full Name" required placeholder="John Doe">
        </div>

        <div class="form-group">
            <label for="org">Organization *</label>
            <input type="text" id="org" name="Organization" required placeholder="NGO, Company, Government Entity">
        </div>

        <div class="form-group">
            <label for="email">Email Address *</label>
            <input type="email" id="email" name="email" required placeholder="john@example.com">
        </div>

        <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="text" id="phone" name="Phone Number" placeholder="+252 XX XXX XXXX">
        </div>

        <div class="form-group">
            <label for="service">Required Service *</label>
            <select id="service" name="Required Service" required>
                <option value="">Select Service</option>
                <option>Market Research</option>
                <option>Monitoring & Evaluation (M&E)</option>
                <option>Baseline Survey</option>
                <option>Endline Survey</option>
                <option>Feasibility Study</option>
                <option>Data Analysis</option>
                <option>Strategic Advisory</option>
                <option>Training & Capacity Building</option>
                <option>Other</option>
            </select>
        </div>

        <div class="form-group">
            <label for="budget">Estimated Budget</label>
            <input type="text" id="budget" name="Estimated Budget" placeholder="USD 5,000">
        </div>

        <div class="form-group">
            <label for="timeline">Expected Timeline</label>
            <input type="text" id="timeline" name="Expected Timeline" placeholder="e.g. 2 Months">
        </div>

        <div class="form-group">
            <label for="details">Project / Proposal Details *</label>
            <textarea id="details" name="Project Details" rows="6" required
                placeholder="Describe your project objectives, scope of work, expected outputs, timeline, and any special requirements."></textarea>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">
            Submit Proposal Request
        </button>

        <p id="formMessage" style="margin-top:15px; font-weight:600;"></p>

    </form>

</div>

<script>
document.getElementById("proposalForm").addEventListener("submit", function(event) {
    event.preventDefault();

    const form = event.target;
    const submitBtn = document.getElementById("submitBtn");
    const message = document.getElementById("formMessage");

    submitBtn.disabled = true;
    submitBtn.innerText = "Sending...";
    message.style.color = "#333";
    message.innerText = "Please wait. Your proposal request is being sent.";

    const formData = new FormData(form);

    fetch("https://formsubmit.co/ajax/mac041@hotmail.com", {
        method: "POST",
        body: formData
    })
    .then(response => response.json())
    .then(data => {
        if (data.success === "true" || data.success === true) {
            message.style.color = "green";
            message.innerText = "✅ Your proposal request has been sent successfully.";
            form.reset();
        } else {
            message.style.color = "red";
            message.innerText = "❌ Sending failed. Please try again or email mac041@hotmail.com directly.";
        }
    })
    .catch(error => {
        message.style.color = "red";
        message.innerText = "❌ Network error. Please check your internet or email mac041@hotmail.com directly.";
    })
    .finally(() => {
        submitBtn.disabled = false;
        submitBtn.innerText = "Submit Proposal Request";
    });
});
</script>
